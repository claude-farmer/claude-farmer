name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npx turbo run build --filter=@claude-farmer/shared

      - name: Build CLI
        run: npx turbo run build --filter=claude-farmer

      - name: Build Web
        run: npx turbo run build --filter=@claude-farmer/web

      - name: Build VSCode
        run: npx turbo run build --filter=claude-farmer-vscode

      - name: Lint Web
        run: npx turbo run lint --filter=@claude-farmer/web
